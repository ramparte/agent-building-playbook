# Agent-Building Playbook - flavor-wheel taxonomy
# GENERATED by scripts/build-wheel.py from patterns/. Do not hand-edit.
# 113 patterns, 6 families, 13 dimensions.
wheel:
  - family: "Mindset"
    gloss: "How to think and what to value before you build."
    pattern_count: 13
    dimensions:
      - dimension: "meta-principles"
        pattern_count: 8
        patterns:
          - slug: "code-is-cheap-maintenance-isnt"
            title: "Code Is Cheap, Maintenance Isn't"
            one_liner: "AI-generated code is free as in puppies — someone still has to feed it, secure it, and maintain it for as long as it lives."
          - slug: "context-is-finite"
            title: "Context Is a Finite Resource"
            one_liner: "Curate the smallest high-signal token set — every token of noise degrades every token of signal."
            also: ["context-engineering"]
          - slug: "fail-loud-harnesses"
            title: "Fail-Loud Harnesses"
            one_liner: "Build harnesses that fail visibly — a harness that silently substitutes its own answer hides the agent's failure from you."
            also: ["reliability", "tool-design"]
          - slug: "reliability-before-features"
            title: "Fix Reliability Before Features"
            one_liner: "Flakiness, not capability, is the enemy — a system that only sometimes works is harder to improve than one that reliably fails."
            also: ["reliability"]
          - slug: "personal-to-shared-topology"
            title: "From Personal Workflow to Shared Operating Model"
            one_liner: "Individual engineers develop powerful personal workflows that don't compose into a team operating model — and the best local agent answer can violate strategy or shared taste; an organization needs shared artifacts, review norms, observability, and patterns."
            also: ["workflow-discipline", "human-factors"]
          - slug: "redesign-work-dont-fill-slots"
            title: "Redesign the Work, Don't Fill Human-Shaped Slots"
            one_liner: "Replacing each human role with an agent-shaped equivalent preserves old inefficiencies — and measuring maturity by percent of code generated measures the wrong thing; redesign the work around what models and tools can now do."
            also: ["human-factors", "workflow-discipline"]
          - slug: "start-least-agentic"
            title: "Start With the Least Agentic Thing"
            one_liner: "Many problems that look like multi-agent workflows need only one well-crafted LLM call."
            also: ["orchestration"]
          - slug: "verify-independently"
            title: "Verify Independently — Agents Fake \"Done\""
            one_liner: "An unobservable step is effectively unrun — treat \"complete\" as a claim that must be independently verified."
            also: ["reliability"]
      - dimension: "taste"
        pattern_count: 5
        patterns:
          - slug: "agents-amplify-experience"
            title: "Agents Amplify Experience"
            one_liner: "Agents multiply the output of whoever wields them — great judgment gets amplified into great results; poor judgment gets amplified into confident mistakes at scale."
          - slug: "automate-but-avoid-mystery-house"
            title: "Automate the Easy, Avoid the Mystery House"
            one_liner: "Automate what you understand completely; never automate your way into a system where nobody knows why it works or what it does."
            also: ["workflow-discipline"]
          - slug: "build-five-to-throw-away"
            title: "Build Five to Throw Away"
            one_liner: "When you don't understand the requirements yet, build several variants in parallel — comparing them reveals what you actually care about."
            also: ["workflow-discipline"]
          - slug: "develop-your-taste"
            title: "Develop Your Taste"
            one_liner: "Taste — the ability to recognize quality and know when something is wrong — is a craft that must be deliberately built; it does not emerge from volume of output alone."
          - slug: "find-the-hard-stuff"
            title: "Find the Hard Stuff"
            one_liner: "Deliberately seek the genuinely difficult parts of a problem — where the real work lives is almost never where it looks like it should be."
  - family: "Context"
    gloss: "What the model sees and remembers."
    pattern_count: 19
    dimensions:
      - dimension: "context-engineering"
        pattern_count: 14
        patterns:
          - slug: "write-select-compress-isolate"
            title: "\"Four Moves: Write, Select, Compress, Isolate\""
            one_liner: "Every context management decision is one of four moves — write it out, select only the relevant part, compress the verbose into the essential, or isolate the detail into a sub-agent."
          - slug: "long-horizon-memory"
            title: "\"Long-Horizon Memory: Compaction, Notes, Isolation\""
            one_liner: "Long-running tasks require three memory strategies — compacting history as it ages, maintaining running notes files, and isolating sub-tasks to separate sessions to prevent context collapse."
          - slug: "thin-pointers"
            title: "\"Thin Pointers, Zero Poisoning\""
            one_liner: "Pass file paths and references between agents instead of full content — let each agent pull only what it needs, only when it needs it."
            also: ["orchestration"]
          - slug: "anchor-on-canonical-names"
            title: "Anchor on Canonical Names"
            one_liner: "A single well-known domain term — \"TDD, London School\", \"arc42\" — activates a whole coherent methodology the model already learned in training, far more reliably than a paragraph paraphrasing the same idea, so name the concept instead of describing it."
            also: ["meta-principles"]
          - slug: "checkpoint-handoff-file"
            title: "Checkpoint to a Handoff File, Then Restart Clean"
            one_liner: "When context grows unwieldy or a session must end, write a structured handoff file capturing exactly what the next session needs, then start fresh with only that file."
            also: ["workflow-discipline"]
          - slug: "context-over-prompt"
            title: "Context Engineering Over Prompt Engineering"
            one_liner: "The model's output quality is bounded by context quality — sculpting what the model sees matters more than sculpting the instruction text."
          - slug: "embed-guidance-in-tool-output"
            title: "Embed Guidance in Tool Output"
            one_liner: "Instead of front-loading every project gotcha into a giant instructions file the model forgets, put the guidance in the outputs of scripts and tools — error and success messages — so the reminder appears exactly where and when it is relevant."
            also: ["tool-design"]
          - slug: "hang-up-call-back"
            title: "Hang Up, Call Back"
            one_liner: "When an agent conversation goes down the wrong path, don't course-correct — rewind history and re-prompt so the model never sees the bad idea."
            also: ["workflow-discipline"]
          - slug: "just-in-time-retrieval"
            title: "Just-in-Time Retrieval Over Pre-Loading"
            one_liner: "Don't fill context with everything that might be relevant — retrieve only what is needed, exactly when it is needed, and discard it after use."
          - slug: "persist-environment-facts"
            title: "Persist Environment Facts"
            one_liner: "Facts about the environment — directory layout, versions, credentials, topology — belong in files the agent can re-read, not floating in context that disappears on reset."
          - slug: "repository-shape-is-cognitive-architecture"
            title: "Repository Shape Is Cognitive Architecture"
            one_liner: "A repository is not just code storage — it is the working memory and context boundary of an agentic workflow; too broad and it poisons context, too narrow and the agent starves, so repo shape is a design decision, not an accident."
            also: ["workflow-discipline", "meta-principles"]
          - slug: "scope-and-expire-memory"
            title: "Scope and Expire Memory"
            one_liner: "A single global memory pool causes context poisoning, obsession, and stagnation — agents cling to discarded architectures and stale assumptions; default to scoped, expiring memory (project-, role-, task-specific), because forgetting is a feature, not a bug."
            also: ["knowledge", "reliability"]
          - slug: "state-the-target"
            title: "State the Target, Not the Prohibition"
            one_liner: "Telling a model what not to do activates the very concept you're suppressing — 'list the planets but not the moon' tends to produce the moon — so phrase instructions as a positive description of the target, and enforce hard prohibitions with a deterministic check rather than louder \"do NOT\"."
            also: ["reliability"]
          - slug: "subagents-as-context-sinks"
            title: "Use Sub-Agents as Context Sinks"
            one_liner: "Delegate detail-heavy work to sub-agents so the orchestrator's context stays clean — the sub-agent absorbs the complexity and returns only a summary."
            also: ["orchestration"]
      - dimension: "knowledge"
        pattern_count: 5
        patterns:
          - slug: "build-a-pattern-registry"
            title: "Build a Pattern Registry"
            one_liner: "Teams independently rediscover the same loops, validators, and review tricks — a pattern registry captures the reusable operating moves with usage guidance and contraindications, so practice transfers without forcing everyone onto the same stack; it is the package manager of agentic practice."
            also: ["meta-principles", "workflow-discipline"]
          - slug: "gene-transfer"
            title: "Gene Transfer — Port the Behavior, Not the Code"
            one_liner: "The reusable unit between systems is rarely a whole tool but a trait — a review prompt, a validation loop, a context-file structure, a CLI affordance — so separate phenotype from organism and transfer what's valuable; at system scale this becomes semantic porting of behavior across stacks."
            also: ["tool-design", "meta-principles"]
          - slug: "contradiction-extraction"
            title: "Mine for Contradictions"
            one_liner: "Contradictions are high-signal — they reveal where an organization has changed its mind without updating its artifacts or has never reconciled competing goals; run a detector across transcripts, specs, and decisions that surfaces conflicts for discussion rather than auto-fixing them."
            also: ["intent", "verification"]
          - slug: "mine-transcripts"
            title: "Mine Transcripts Into Structured Knowledge"
            one_liner: "Meeting transcripts, session logs, and Slack threads are raw material, not output — record, then transform them into topic clusters, entity graphs, contradiction lists, action repositories, takebooks, and persona material; recording everything without transformation produces storage, not knowledge."
            also: ["context-engineering", "observability"]
          - slug: "self-modifying-context-needs-review"
            title: "Self-Modifying Context Needs Review"
            one_liner: "Letting an agent edit its own persona or instruction files is powerful and risky — it can correct repeated bad habits but also lock in bad lessons, please the user instead of solving the problem, or drift unaudited; require reflective changes that cite evidence and pass review before becoming canonical."
            also: ["reliability", "human-factors"]
  - family: "Tooling"
    gloss: "The model's hands, and what they cost."
    pattern_count: 10
    dimensions:
      - dimension: "tool-design"
        pattern_count: 6
        patterns:
          - slug: "code-execution-tools"
            title: "Code Execution Beats Loading Hundreds of Tool Defs"
            one_liner: "A single code-execution tool — bash, Python, a REPL — often replaces dozens of specialized tools and avoids the context cost of registering a large tool set that the agent must reason over on every call."
            also: ["context-engineering"]
          - slug: "critic-applications"
            title: "Critic Applications"
            one_liner: "Build a deterministic tool — a binary, parser, validator, or CLI — that acts as law from the agent's perspective; it cannot be negotiated with, only satisfied, which compresses complex intent into a checkable affordance and compensates for model weakness."
            also: ["verification", "reliability"]
          - slug: "tools-for-agents"
            title: "Design Tools for Agents, Not Humans"
            one_liner: "Agent tools should be structured for machine parsing — unambiguous outputs, complete information in every response, no UI affordances that only make sense for humans."
          - slug: "agents-optimize-tools"
            title: "Let Agents Evaluate and Optimize Your Tools"
            one_liner: "Use an agent to test your tool set — have it attempt real tasks, observe where it selects incorrectly or fails, and feed those observations back into tool descriptions and interfaces before deploying."
            also: ["verification"]
          - slug: "namespace-tools"
            title: "Namespace Tools, Write Unambiguous Descriptions"
            one_liner: "Group tools under a clear namespace and write descriptions that tell the model exactly when to call this tool and when to call a similar one instead — ambiguous tool selection is a primary source of agent errors."
          - slug: "search-over-list"
            title: "Prefer Search/Filter Over List-Everything"
            one_liner: "Give agents a search or filter interface rather than a tool that returns a full list — agents that list everything then scan results are burning context on data they'll mostly discard."
            also: ["context-engineering"]
      - dimension: "cost-routing"
        pattern_count: 4
        patterns:
          - slug: "delegation-token-economics"
            title: "Delegation Is Token Economics"
            one_liner: "Every delegation decision is a token investment — the tokens spent spawning and briefing a subagent must be justified by the value of offloading the work from the orchestrator's context budget."
            also: ["context-engineering", "orchestration"]
          - slug: "invest-the-expensive-model-in-the-harness"
            title: "Invest the Expensive Model in the Harness"
            one_liner: "Spend your strongest, most expensive model on improving the harness itself — then run cheaper models through the better harness — because better orchestration is second-order leverage that makes weaker models more useful."
            also: ["orchestration", "meta-principles"]
          - slug: "match-model-to-stage"
            title: "Match Model to Stage"
            one_liner: "Different stages of a workflow warrant different model capability levels — route expensive models to complex reasoning stages and cheap models to mechanical stages, not the other way around."
          - slug: "role-based-routing"
            title: "Pull Models From Provisioned Roles"
            one_liner: "Reference abstract capability roles in code rather than model names — let external configuration map roles to models, so routing decisions survive model changes without code changes."
  - family: "Orchestration"
    gloss: "How work is shaped, decomposed, and run."
    pattern_count: 29
    dimensions:
      - dimension: "orchestration"
        pattern_count: 16
        patterns:
          - slug: "autonomy-when-justified"
            title: "Add Autonomy Only When Justified"
            one_liner: "Every degree of autonomy you give an agent must be paid for with oversight proportional to the risk — add it only when the cost-benefit calculation is explicit and positive."
          - slug: "three-primitives"
            title: "Build From Three Primitives"
            one_liner: "Every agentic system is built from three primitives — LLM call, tool call, and loop. Understand these primitives completely before reaching for higher-level abstractions."
            also: ["tool-design"]
          - slug: "production-feedback-loop"
            title: "Close the Loop From Production Back to Fix"
            one_liner: "Finishing doesn't end at deployment — route support messages, incidents, metrics, and user reports into a triage loop that proposes a fix, validates it, ships it behind a flag, and watches whether the signal disappears; this is the agentic version of a Toyota production system."
            also: ["observability", "workflow-discipline"]
          - slug: "composable-patterns"
            title: "Composable Orchestration Patterns"
            one_liner: "Build orchestration from a small set of named, reusable primitives — sequences, conditionals, fan-outs, and loops — rather than writing bespoke control flow for every workflow."
          - slug: "single-threaded-default"
            title: "Default to a Single-Threaded Linear Agent"
            one_liner: "Run one task at a time in sequence unless you have a concrete reason to fan out — parallelism is an optimization, not a starting point."
          - slug: "clean-slate-delegation"
            title: "Default to Clean-Slate Delegation"
            one_liner: "When spawning a subagent, start with an empty context and provide only what the task needs — shared history is a source of inherited confusion, not free context."
            also: ["context-engineering"]
          - slug: "workflows-vs-agents"
            title: "Distinguish Workflows From Agents"
            one_liner: "A workflow is a fixed sequence of steps with known branching; an agent decides dynamically what to do next. Conflating the two produces systems that are harder to test, monitor, and trust."
          - slug: "guardrails-and-escalation"
            title: "Layer Guardrails and Human Escalation"
            one_liner: "Build in multiple layers of guardrails — input validation, output checking, action limits, and explicit escalation paths — so errors are caught before they compound and humans are brought in before damage is done."
            also: ["reliability"]
          - slug: "recon-before-action"
            title: "Lead With Recon Before Action"
            one_liner: "Before taking any action that touches external state, first run a read-only reconnaissance pass to understand what exists, what constraints apply, and what the action will actually affect."
          - slug: "match-topology-to-the-work"
            title: "Match the Topology to the Work"
            one_liner: "Choose your agentic topology deliberately — from one-shot prompt to slash-goal loop to skill to graph to hierarchy to studio — by the cost of failure, clarity of intent, size of the work, and degree of repeatability."
            also: ["workflow-discipline", "meta-principles"]
          - slug: "parallel-attempts-at-one-task"
            title: "Parallel Attempts at One Task"
            one_liner: "Because a model is non-deterministic, one attempt is a single die roll — for a hard or quality-sensitive task, run several implementations of the same task in parallel from one checkpoint, then pick the best or splice the strongest parts of each."
            also: ["cost-routing", "workflow-discipline"]
          - slug: "deterministic-rails"
            title: "Put Deterministic Rails Around Model Judgment"
            one_liner: "The strongest agentic workflows interleave deterministic steps and model-mediated steps so neither layer must be perfect — the model translates intent into checkable state, and scripts, tests, and validators catch drift."
            also: ["reliability", "verification", "tool-design"]
          - slug: "parallel-independent-tracks"
            title: "Run Independent Agents in Parallel"
            one_liner: "When two or more tasks have no ordering dependency and no shared mutable state, run them in parallel agents rather than sequentially — wall-clock latency is the only cost that matters."
          - slug: "shape-work-as-an-attractor"
            title: "Shape the Workflow as an Attractor"
            one_liner: "Design the workflow so the correct outcome is its stable equilibrium — the state it converges toward from a wide range of starting points and returns to after the model drifts — and judge success by that convergence, not by whether a step reported done."
            also: ["workflow-discipline", "meta-principles"]
          - slug: "share-full-context"
            title: "Share Full Context; Every Action Carries Decisions"
            one_liner: "When delegating to a subagent or spawning a parallel worker, include everything the agent needs to make good decisions — the goal, constraints, prior findings, and any decisions already made."
          - slug: "architect-then-builder"
            title: "Two-Phase Build: Architect Then Builder"
            one_liner: "Separate design from implementation by running an architect agent first to produce a complete specification, then a builder agent to implement it — never conflate the two roles in one pass."
            also: ["workflow-discipline"]
      - dimension: "workflow-discipline"
        pattern_count: 13
        patterns:
          - slug: "self-ablating-harness"
            title: "Ablate the Harness as Models Improve"
            one_liner: "Periodically have a stronger model inspect your workflow and delete steps that are no longer needed, shorten prompts, and merge nodes — because model capability changes faster than workflow habits, and yesterday's scaffolding becomes today's tax."
            also: ["meta-principles", "cost-routing"]
          - slug: "bite-sized-tasks"
            title: "Bite-Sized Tasks"
            one_liner: "Break work into units small enough that each completes, commits, and can be reviewed independently."
          - slug: "brownfield-is-the-real-test"
            title: "Brownfield Is the Real Test"
            one_liner: "Greenfield prototypes are easy to celebrate; brownfield systems expose whether a workflow can handle legacy constraints, hidden dependencies, and production risk — the mature move is to characterize existing behavior and write regression tests before any rewrite, never a blind rewrite."
            also: ["reliability", "verification"]
          - slug: "decompose-on-timeout"
            title: "Decompose and Retry on Timeout"
            one_liner: "When a task times out, the answer is almost never to raise the timeout — it is to break the task into smaller pieces."
            also: ["orchestration"]
          - slug: "document-intent"
            title: "Document Intent, Not Just Method"
            one_liner: "Code describes how; comments and specs must describe why — the reasoning that code cannot encode."
          - slug: "finishing-is-the-bottleneck"
            title: "Finishing Is the Bottleneck, Not Starting"
            one_liner: "Models make starting easy — a plausible 80% appears fast — but plausible work is not finished work, and the final 20% consumes most of the attention and risk; the real metric is convergence — work that reliably reaches an accepted, shipped, observed state."
            also: ["reliability", "meta-principles"]
          - slug: "gate-the-phases"
            title: "Gate the Phases Explicitly"
            one_liner: "Declare a hard transition between design and build, and between build and ship — phases that blur produce work that cannot be reviewed or rolled back."
          - slug: "clear-stop-condition"
            title: "Hand Off With a Clear Stop Condition"
            one_liner: "An agent without a stop condition will find one itself — and it will not be the one you wanted."
            also: ["orchestration"]
          - slug: "implement-to-learn"
            title: "Implement to Learn"
            one_liner: "The fastest way to understand a problem is to build a small, throwaway version of the solution."
          - slug: "keep-specs-in-sync"
            title: "Keep Specs in Sync"
            one_liner: "A spec that diverges from the implementation is worse than no spec — it actively misleads every agent that reads it."
          - slug: "prove-on-small-sample"
            title: "Prove the Pipeline on 2 Before 20"
            one_liner: "Run the full pipeline on two items end-to-end before scaling to the full dataset."
            also: ["reliability"]
          - slug: "rebuild-often"
            title: "Rebuild Often"
            one_liner: "Regular rebuilds from scratch catch accumulated drift that incremental changes normalize."
          - slug: "work-backward-from-the-shipping-dock"
            title: "Work Backward From the Shipping Dock"
            one_liner: "Start from where work becomes real — production, approval, operator adoption, user comprehension — and ask what proof would convince you it's ready; the proof system then shapes the workflow, instead of asking \"can the model build this?\""
            also: ["verification", "reliability"]
  - family: "Trust"
    gloss: "Making the result correct, reliable, and observable."
    pattern_count: 25
    dimensions:
      - dimension: "verification"
        pattern_count: 10
        patterns:
          - slug: "adversarial-parallel-review"
            title: "Adversarial Parallel Review"
            one_liner: "Run several reviewers with different models or roles and little shared context, reward significant findings over volume, then have a meta-reviewer rank what matters — because an implementer shares the blind spots that produced its own bugs."
            also: ["reliability", "orchestration"]
          - slug: "design-the-loop"
            title: "Designing the Agentic Loop Is the Core Skill"
            one_liner: "The quality of an agentic system is determined almost entirely by the design of its loop — how the agent perceives, decides, acts, and verifies before cycling again."
          - slug: "eval-driven-development"
            title: "Eval-Driven Development"
            one_liner: "Build evals before building features — you cannot improve what you cannot measure, and you cannot trust improvements you have not defined a measurement for."
            also: ["workflow-discipline"]
          - slug: "standing-eval-capability"
            title: "Evals Are a Standing Capability, Not a One-Time Gate"
            one_liner: "An eval suite that runs once at launch and is never run again is not an eval suite — it is a historical document that measured a system that no longer exists."
          - slug: "evidence-before-assertions"
            title: "Evidence Before Assertions"
            one_liner: "A claim about a system's state is not knowledge — it is a hypothesis. Run the verification command and read the output before making any assertion about whether something worked."
            also: ["reliability"]
          - slug: "self-verification"
            title: "Give Agents the Ability to Verify Their Own Work"
            one_liner: "An agent that can detect its own errors is orders of magnitude more reliable than one that can only produce output — build verification into the agent before shipping it."
            also: ["reliability"]
          - slug: "three-file-rule"
            title: "Incremental Validation: The 3-File Rule"
            one_liner: "Before processing a full batch, verify the pipeline works correctly on three representative files — catching bugs at three is dramatically cheaper than catching them at three thousand."
            also: ["workflow-discipline"]
          - slug: "test-what-not-how"
            title: "Test What the Product Does, Not How"
            one_liner: "Tests that describe externally observable behavior survive refactoring; tests that describe internal implementation become a maintenance tax that grows with every change."
          - slug: "tests-first-on-api-change"
            title: "Tests Are Code — Update Them First on API Change"
            one_liner: "When an API changes, update its tests before updating its implementation — the tests are the specification, and updating them first forces you to define what the change means before you build it."
            also: ["workflow-discipline"]
          - slug: "video-driven-development"
            title: "Video-Driven Development"
            one_liner: "Require agents to produce a before-and-after video of the real user scenario — a video sets a higher bar than a textual claim and forces the agent to exercise the actual product surface, not just the code; the rule is show, don't assert."
            also: ["reliability", "observability"]
      - dimension: "reliability"
        pattern_count: 9
        patterns:
          - slug: "demand-independent-proof"
            title: "Demand Independent Proof, Not a Status Report"
            one_liner: "An agent's claim of success is a hypothesis — treat it as one until you hold evidence that no longer originates from the agent itself."
          - slug: "recipe-not-conversation"
            title: "Encode Multi-Step Work as a Recipe"
            one_liner: "A conversation is a trace of what happened once — a recipe is a specification that can be replayed, inspected, versioned, and recovered from."
            also: ["workflow-discipline"]
          - slug: "fail-loud-over-fallbacks"
            title: "Fail Loud Over Fallbacks"
            one_liner: "A fallback that hides a failure teaches the system nothing and costs the same as the failure it replaced — prefer a loud stop over a silent substitution."
          - slug: "fix-the-root-cause"
            title: "Fix the Root Cause, Demand a Diagnosis"
            one_liner: "Agents tend to patch the visible symptom without pulling the thread to the cause — for recurring, production, or architecture-level issues, require a diagnosis artifact that explains the root cause before any fix is accepted."
            also: ["verification", "workflow-discipline"]
          - slug: "auditable-artifacts"
            title: "Make Every Stage Produce an Auditable Artifact"
            one_liner: "A stage with no artifact is a stage that cannot be audited — and a stage that cannot be audited is a stage you must trust blindly."
            also: ["observability"]
          - slug: "mark-skipped-steps"
            title: "Mark Un-Run Steps Inline for Review"
            one_liner: "A skipped step that is not explicitly marked is indistinguishable from a completed step — make the gap visible or it will be treated as a gap that was filled."
            also: ["observability"]
          - slug: "separate-merge-from-exposure"
            title: "Separate Merge From Exposure"
            one_liner: "Feature flags are one of the most important controls for agent-generated work because they separate merging code from exposing it — default risky changes to staged exposure with explicit rollout criteria and automated rollback, so merge no longer means everyone is affected."
            also: ["workflow-discipline", "orchestration"]
          - slug: "proposer-authority-separation"
            title: "Separate the Proposer From the Authority"
            one_liner: "The entity that proposes an action is the worst authority to approve it — route approval through a role with no stake in the proposal's acceptance."
            also: ["orchestration"]
          - slug: "auditor-agent"
            title: "Use a Second Agent as Auditor"
            one_liner: "The agent that did the work is the worst possible choice to verify the work — put a second agent in the audit seat with no stake in the original claim."
            also: ["orchestration"]
      - dimension: "observability"
        pattern_count: 6
        patterns:
          - slug: "awareness-layer"
            title: "Build an Awareness Layer That Watches Your Work"
            one_liner: "A separate process or agent that monitors the primary agent's actions in real time catches drift, failures, and unexpected behavior before they compound — the watcher that the working agent cannot be for itself."
          - slug: "emit-events"
            title: "If It's Important, Emit an Event"
            one_liner: "If a decision, state change, or outcome matters to understanding what happened, it should produce a structured event — not a log line, not a comment, not a hope that someone was watching."
          - slug: "real-environment-execution"
            title: "Run Real Workloads in Their Proper Environment"
            one_liner: "Agents that run workloads in simulated or sandboxed environments discover only simulated problems — run the real thing in the real place if you want real answers."
          - slug: "supervise-many-agents"
            title: "Supervise Many Agents Through One Interface"
            one_liner: "As agents multiply, the limiting factor is the human's ability to see them — build the supervision surface — a dashboard of what's running, stuck, done, costly, or waiting; status exhaust; an attention firewall; a review queue; a cost monitor; and the ability to resurrect and hold old sessions accountable."
            also: ["human-factors", "orchestration"]
          - slug: "agent-struggle-is-a-signal"
            title: "The Agent's Struggle Is a Signal"
            one_liner: "When an AI agent starts thrashing on a codebase — missing duplicated call sites, running out of context mid-change, making excuses about failing tests — read it as an early warning that maintainability is decaying, and refactor, instead of just fighting the agent."
            also: ["taste"]
          - slug: "session-archaeology"
            title: "Use Session History as Primary Evidence"
            one_liner: "When something went wrong — or right — in a prior run, the session transcript is the primary evidence; reading it is the first act of diagnosis, not a fallback after other approaches fail."
  - family: "People"
    gloss: "Human intent, attention, and leverage."
    pattern_count: 17
    dimensions:
      - dimension: "human-factors"
        pattern_count: 9
        patterns:
          - slug: "attention-is-the-scarce-resource"
            title: "Attention Is the Scarce Resource"
            one_liner: "When agents generate more work, options, and output than humans can inspect, the bottleneck is no longer machine throughput but human attention — so treat attention as a managed, budgeted resource, not an infinite input."
            also: ["meta-principles", "observability"]
          - slug: "coaches-and-players"
            title: "Coaches and Players"
            one_liner: "Leverage no longer comes only from senior people doing senior work directly — it comes from injecting senior judgment into many agent-driven workflows; coaches frame problems and steer, players drive the agents day to day."
            also: ["orchestration", "meta-principles"]
          - slug: "design-for-emotional-ownership"
            title: "Design for Emotional Ownership"
            one_liner: "A system that technically works can still fail to be adopted — fully headless automation can feel alienating, and people who feel no ownership of an output won't trust it; design the human interface to autonomy with visible progress, proof artifacts, and moments of authorship."
            also: ["observability", "taste"]
          - slug: "earn-the-interruption"
            title: "Earn the Interruption"
            one_liner: "Human attention is scarce, so an agent should not interrupt merely because it hit a normal checkpoint — it should interrupt only when human judgment is now the bottleneck; insert humans at specific edges (risky deploy, unclear intent, high-cost loop, compliance exception, repeated nonconvergence), not everywhere."
            also: ["orchestration", "workflow-discipline"]
          - slug: "governance-is-infrastructure"
            title: "Governance Is Infrastructure, Not a Document"
            one_liner: "In agentic organizations governance can't be a policy doc that sits outside the workflow — it must be embedded in tools, prompts, validators, logs, and approval edges; the common substrate is an LLM proxy/gateway that logs usage, tracks cost, enforces policy, and provides observability."
            also: ["observability", "orchestration"]
          - slug: "leverage-over-efficiency"
            title: "Leverage Over Efficiency"
            one_liner: "Framing AI as efficiency asks how to do the same work with fewer people; framing it as leverage asks how the same people can build, explore, and operate at a larger scale — and leverage is the frame that matches what advanced practitioners actually do."
            also: ["meta-principles"]
          - slug: "match-agent-metaphor-to-layer"
            title: "Match the Agent Metaphor to the Layer"
            one_liner: "Treating every agent as a person creates confusion; treating every agent as a stateless tool loses useful continuity — choose the framing per layer — disposable process, independent critic, manager-like orchestrator, long-lived assistant, or policy-bound organizational actor."
            also: ["orchestration", "meta-principles"]
          - slug: "nontechnical-owners-with-guardrails"
            title: "Nontechnical Owners, With Guardrails"
            one_liner: "Agentic tooling lets people with clear intent and domain knowledge ship software they could never have built before — but ownership by nontechnical builders only works when surrounded by scaffolds, review loops, acceptance evidence, rollback, and coaching."
            also: ["reliability", "workflow-discipline"]
          - slug: "the-new-literacy-is-operating"
            title: "The New Literacy Is Operating, Not Prompting"
            one_liner: "When the machine writes most of the implementation, the skill that matters shifts from typing code to steering, decomposing, inspecting, validating, and governing agentic workflows — train for operating, not for prompting tricks."
            also: ["workflow-discipline", "meta-principles"]
      - dimension: "intent"
        pattern_count: 8
        patterns:
          - slug: "decision-theater"
            title: "Decision Theater"
            one_liner: "Build a small interactive artifact — a model, simulator, spreadsheet, or scenario explorer — that lets stakeholders change assumptions instead of debating abstractions; if they disagree with the conclusion, they must reveal which assumption they reject."
            also: ["workflow-discipline", "human-factors"]
          - slug: "dont-automate-the-workaround"
            title: "Don't Automate the Workaround"
            one_liner: "In legacy and bureaucratic domains the stated process is often itself a workaround for another broken process — automating it with an agent entrenches the dysfunction at speed; ask whether the workflow should still exist before you accelerate it."
            also: ["workflow-discipline", "meta-principles"]
          - slug: "good-pile-bad-pile"
            title: "Good Pile, Bad Pile"
            one_liner: "In domains where stakeholders say \"it depends,\" stop asking for abstract rules and start collecting labeled examples in the domain's own language — good, bad, acceptable-but-awkward, compliant, risky — because examples become intent training data agents can learn the dependency structure from."
            also: ["verification", "knowledge"]
          - slug: "interview-to-a-spec"
            title: "Interview to a Spec Before Implementing"
            one_liner: "Put a skeptical interviewer in front of intent — one that asks why before how, reflects back its understanding, refuses to implement until it can restate the goal cleanly, and emits a concise spec the human can reject — turning messy intent into an executable specification."
            also: ["workflow-discipline", "verification"]
          - slug: "people-edit-better-than-they-author"
            title: "People Edit Better Than They Author"
            one_liner: "Most stakeholders cannot write a clean requirement, but shown a concrete artifact they can instantly say what's wrong — so elicit intent by giving people something to react to, because cheap software has made a throwaway artifact the fastest way to extract intent."
            also: ["workflow-discipline", "human-factors"]
          - slug: "requirements-are-disguised-solutions"
            title: "Requirements Are Disguised Solutions"
            one_liner: "Stakeholders ask for a field, a button, a report, or a workflow change — but agents will happily implement the stated solution even when it's a workaround for a broken process, so the intent layer must ask what the request is actually trying to accomplish."
            also: ["workflow-discipline"]
          - slug: "shadow-then-transform"
            title: "Shadow the User, Then Transform the Transcript"
            one_liner: "Tacit knowledge — workarounds, local norms, exception paths, institutional memory — lives in how people actually work, so sit with users and record them; agentic tooling doesn't remove the observation, it accelerates what happens after it."
            also: ["knowledge", "human-factors"]
          - slug: "simulated-review-squad"
            title: "Simulated Review Squad"
            one_liner: "Before work reaches real users, run it past a panel of simulated perspectives — expert and novice users, compliance, support, executive sponsor, skeptical engineer, accessibility, security — built from real transcripts and tickets, to surface objections early and cheaply."
            also: ["verification", "reliability"]
